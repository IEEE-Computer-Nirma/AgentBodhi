<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bodhi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    :root {
        --sidebar-bg: #f9f9f9;
        --chat-bg: #ffffff;
        --border-color: #e5e5e5;
        --text-main: #0d0d0d;
        --text-muted: #666666;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --user-bg: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        height: 100vh;
        color: var(--text-main);
        background: var(--chat-bg);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* --- Sidebar --- */
    .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 1rem;
        flex-shrink: 0;
        z-index: 10;
    }
    .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
        font-weight: 600;
        font-size: 1.125rem;
        color: var(--text-main);
    }
    .brand img {
        width: 36px;
        height: 36px;
    }
    .upload-btn {
        background: white;
        border: 1px solid var(--border-color);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 500;
        font-size: 0.875rem;
        color: var(--text-main);
        transition: all 0.2s;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        margin-bottom: 2rem;
        width: 100%;
        justify-content: flex-start;
    }
    .upload-btn:hover {
        background: #f3f4f6;
        border-color: #d1d5db;
    }
    .upload-btn svg { width: 18px; height: 18px; color: var(--text-muted); }
    #file-input { display: none; }
    .upload-notification {
        margin-bottom: 0.75rem;
        padding: 0.65rem 1.5rem 0.65rem 0.9rem;
        border-radius: 0.7rem;
        border: 1px solid #c7d2fe;
        background: #eef2ff;
        color: #312e81;
        font-size: 0.85rem;
        line-height: 1.4;
        display: none;
        word-wrap: break-word;
        word-break: break-word;
        position: relative;
    }
    .close-notif {
        position: absolute;
        top: 0.35rem;
        right: 0.4rem;
        background: none;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        color: #312e81;
        opacity: 0.6;
        line-height: 1;
        padding: 0;
    }
    .close-notif:hover {
        opacity: 1;
    }

    .agents-header {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.75rem;
        padding: 0 0.5rem;
    }
    .agents-list {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        overflow-y: auto;
    }
    .agent-card {
        padding: 0.75rem 0.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
    }
    .agent-card:hover {
        background: #e5e7eb;
    }
    .agent-checkbox {
        margin-top: 0.15rem;
        accent-color: var(--accent);
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    .agent-info {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
    }
    .agent-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-main);
    }
    .agent-desc {
        font-size: 0.75rem;
        color: var(--text-muted);
        line-height: 1.3;
    }

    /* --- Main Chat Area --- */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        min-width: 0;
    }
    .chat-scroll {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 120px;
        scroll-behavior: smooth;
    }
    .chat-content {
        max-width: 48rem;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        padding: 2rem 1rem;
    }

    /* --- Empty State --- */
    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--text-muted);
        gap: 1rem;
        padding-top: 15vh;
    }
    .empty-state .logo-large {
        width: 64px;
        height: 64px;
        margin-bottom: 0.5rem;
        opacity: 0.6;
    }
    .empty-state h2 {
        font-size: 1.5rem;
        color: var(--text-main);
        font-weight: 600;
        margin: 0;
    }
    .empty-state p {
        margin: 0;
        font-size: 0.9375rem;
        max-width: 400px;
        line-height: 1.5;
    }

    /* --- Messages --- */
    .message {
        display: flex;
        gap: 1.25rem;
        padding: 1.5rem 0;
    }
    .message.system {
        justify-content: center;
        padding: 0.5rem 0;
    }
    .message.system .msg-content {
        background: #f3f4f6;
        color: var(--text-muted);
        padding: 0.5rem 1rem;
        border-radius: 1rem;
        font-size: 0.85rem;
        flex: none;
    }
    .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 0.875rem;
        font-weight: 600;
    }
    .avatar.user { background: var(--user-bg); border: 1px solid var(--border-color); color: var(--text-main); }
    .avatar.ai { background: var(--accent); color: white; }
    .avatar svg { width: 18px; height: 18px; }

    .msg-body {
        flex: 1;
        min-width: 0;
    }
    .msg-header {
        font-weight: 600;
        margin-bottom: 0.5rem;
        font-size: 0.9375rem;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .msg-content {
        line-height: 1.6;
        font-size: 0.95rem;
        color: var(--text-main);
    }

    /* Markdown Styles */
    .msg-content p { margin: 0 0 1rem 0; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content pre {
        background: #f3f4f6;
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        font-size: 0.875rem;
        border: 1px solid var(--border-color);
        margin: 1rem 0;
    }
    .msg-content code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #f3f4f6;
        padding: 0.15rem 0.3rem;
        border-radius: 0.25rem;
        font-size: 0.85em;
    }
    .msg-content pre code { background: transparent; padding: 0; border: none; }
    .msg-content ul, .msg-content ol { margin: 0 0 1rem 0; padding-left: 1.5rem; }
    .msg-content li { margin-bottom: 0.25rem; }

    /* --- Input Area --- */
    .input-area {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 40%);
        padding: 2rem 1rem 1.5rem 1rem;
        display: flex;
        justify-content: center;
        z-index: 5;
    }
    .input-wrapper {
        width: 100%;
        max-width: 48rem;
        background: white;
        border: 1px solid #d1d5db;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        border-radius: 1rem;
        display: flex;
        align-items: flex-end;
        padding: 0.5rem 0.5rem 0.5rem 1.25rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
        border-color: var(--accent);
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.1);
    }
    .input-wrapper textarea {
        flex: 1;
        border: none;
        outline: none;
        resize: none;
        max-height: 200px;
        min-height: 24px;
        padding: 0.5rem 0;
        font-family: inherit;
        font-size: 0.95rem;
        line-height: 1.5;
        background: transparent;
        color: var(--text-main);
    }
    .input-wrapper textarea::placeholder { color: #9ca3af; }

    .send-btn {
        background: var(--accent);
        color: white;
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
        margin-left: 0.5rem;
        margin-bottom: 0.15rem;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .pulse {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="brand">
        <img src="/static/logo.svg" alt="Agent Bodhi Logo">
        <span>Agent Bodhi</span>
    </div>

    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        Upload Paper Context
    </button>
    <input type="file" id="file-input" accept="application/pdf">
    <div id="upload-notification" class="upload-notification"></div>

    <button class="upload-btn" id="analyze-btn" style="display: none;" onclick="runFullAnalysis()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
        Run Full Analytics Dashboard
    </button>

    <div class="agents-header">Specialist Agents</div>
    <div class="agents-list" id="agents-list">
        <!-- Dynamically populated -->
    </div>
</div>

<div class="main">
    <div class="chat-scroll" id="chat-container">
        <div class="chat-content" id="chat-history">
            <div class="empty-state" id="empty-state">
                <img src="/static/logo.svg" alt="Logo" class="logo-large">
                <h2>How can I help you research?</h2>
                <p>Upload a PDF paper from the sidebar to initialize the AI constraints, then ask your question to multiple agents at once.</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="chat-input" rows="1" placeholder="Upload a paper first..." disabled></textarea>
            <button id="send-btn" class="send-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    let isPaperLoaded = false;
    let currentSessionId = null;
    let agentsData = [];

    const agentsListEl = document.getElementById('agents-list');
    const chatHistoryEl = document.getElementById('chat-history');
    const chatInputEl = document.getElementById('chat-input');
    const sendBtnEl = document.getElementById('send-btn');
    const fileInputEl = document.getElementById('file-input');
    const analyzeBtnEl = document.getElementById('analyze-btn');
    const uploadNotifEl = document.getElementById('upload-notification');
    const emptyStateEl = document.getElementById('empty-state');
    const chatContainerEl = document.getElementById('chat-container');

    // Auto-resize textarea
    chatInputEl.addEventListener('input', function() {
        this.style.height = 'auto';
        let newHeight = Math.min(this.scrollHeight, 200);
        this.style.height = newHeight + 'px';
        if (this.value.trim().length > 0 && isPaperLoaded) {
            sendBtnEl.disabled = false;
        } else {
            sendBtnEl.disabled = true;
        }
    });

    // Fetch agents on load
    fetch('/api/agents')
        .then(res => res.json())
        .then(data => {
            agentsData = data;
            agentsData.forEach(agent => {
                const div = document.createElement('div');
                div.className = 'agent-card';
                div.onclick = function(e) {
                    // Prevent double toggling if clicked directly on checkbox
                    if(e.target.tagName !== 'INPUT') {
                        const cb = this.querySelector('input[type="checkbox"]');
                        cb.checked = !cb.checked;
                    }
                };
                div.innerHTML = `
                    <input type="checkbox" class="agent-checkbox" value="${agent.slug}" checked>
                    <div class="agent-info">
                        <span class="agent-name">${agent.label}</span>
                        <span class="agent-desc">${agent.description}</span>
                    </div>
                `;
                agentsListEl.appendChild(div);
            });
        })
        .catch(err => console.error("Failed to load agents", err));

    // Common function to scroll to bottom
    function scrollToBottom() {
        chatContainerEl.scrollTop = chatContainerEl.scrollHeight;
    }

    // Append Message to UI
    function appendMessage(role, content, agentLabel = null) {
        if (emptyStateEl) emptyStateEl.style.display = 'none';

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;

        if (role === 'system') {
            msgDiv.innerHTML = `<div class="msg-content">${content}</div>`;
        } else if (role === 'user') {
            msgDiv.innerHTML = `
                <div class="avatar user">You</div>
                <div class="msg-body">
                    <div class="msg-header">You</div>
                    <div class="msg-content">${content}</div>
                </div>
            `;
        } else if (role === 'ai') {
            msgDiv.innerHTML = `
                <div class="avatar ai">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.428-1.428L13.5 18.75l1.178-.394a2.25 2.25 0 001.428-1.428L16.5 15.75l.394 1.178a2.25 2.25 0 001.428 1.428l1.178.394-1.178.394a2.25 2.25 0 00-1.428 1.428z" /></svg>
                </div>
                <div class="msg-body">
                    <div class="msg-header">${agentLabel || 'Agent'}</div>
                    <div class="msg-content">${marked.parse(content)}</div>
                </div>
            `;
        }

        chatHistoryEl.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    fileInputEl.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        const loadingMsg = appendMessage('system', `<span class="pulse">Uploading and reading <strong>${file.name}</strong>...</span>`);

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            chatHistoryEl.removeChild(loadingMsg);

            if (res.ok) {
                isPaperLoaded = true;
                currentSessionId = data.session_id;
                analyzeBtnEl.style.display = 'flex'; // show analyze button
                chatInputEl.disabled = false;
                chatInputEl.placeholder = "Message your agents...";
                chatInputEl.focus();
                showUploadNotification(`Ready! The context from <strong>${file.name}</strong> has been loaded. Select your agents below and ask a question. Or generate a full analytics dashboard using the side menu.`);
            } else {
                appendMessage('system', `Error: ${data.detail || 'Upload failed'}`);
            }
        } catch (err) {
            chatHistoryEl.removeChild(loadingMsg);
            appendMessage('system', `Upload failed: ${err.message}`);
        }
    });

    async function sendMessage() {
        const text = chatInputEl.value.trim();
        if (!text || !isPaperLoaded || !currentSessionId) return;

        // Get selected agents
        const checkboxes = agentsListEl.querySelectorAll('input[type="checkbox"]:checked');
        const selectedSlugs = Array.from(checkboxes).map(cb => cb.value);

        if (selectedSlugs.length === 0) {
            alert("Please select at least one agent from the sidebar!");
            return;
        }

        appendMessage('user', text);
        chatInputEl.value = '';
        chatInputEl.style.height = 'auto'; // Reset height

        // Show loading state
        chatInputEl.disabled = true;
        sendBtnEl.disabled = true;
        const loadingMsg = appendMessage('system', '<span class="pulse">Agents are generating analysis...</span>');

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    agents: selectedSlugs,
                    session_id: currentSessionId
                })
            });

            const data = await res.json();
            chatHistoryEl.removeChild(loadingMsg);

            if (res.ok) {
                for (const [slug, responseText] of Object.entries(data.responses)) {
                    const agentInfo = agentsData.find(a => a.slug === slug);
                    const label = agentInfo ? agentInfo.label : slug;
                    appendMessage('ai', responseText, label);
                }
            } else {
                appendMessage('system', `Error: ${data.detail || 'Chat failed'}`);
            }
        } catch (err) {
            chatHistoryEl.removeChild(loadingMsg);
            appendMessage('system', `Failed to send request: ${err.message}`);
        } finally {
            chatInputEl.disabled = false;
            if(chatInputEl.value.trim().length > 0) sendBtnEl.disabled = false;
            chatInputEl.focus();
        }
    }

    sendBtnEl.addEventListener('click', sendMessage);
    chatInputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if(!sendBtnEl.disabled) sendMessage();
        }
    });

    async function runFullAnalysis() {
        if (!fileInputEl.files[0]) return;

        chatInputEl.disabled = true;
        sendBtnEl.disabled = true;
        analyzeBtnEl.disabled = true;

        const loadingMsg = appendMessage('system', `<span class="pulse">Running full rigorous background check and analysis... This usually takes ~60 seconds to query all indices.</span>`);

        const formData = new FormData();
        formData.append('file', fileInputEl.files[0]);

        try {
            const res = await fetch('/api/analyze', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            chatHistoryEl.removeChild(loadingMsg);

            if (res.ok) {
                // We should update the current session ID in case the dashboard generated a new context dict
                currentSessionId = data.session_id;

                let dashboardHTML = `
                    <h3>📊 AI Dashboard Report</h3>
                    <p><strong>Novelty Score:</strong> ${data.novelty_score}/10</p>
                    <p><strong>Reproducibility Score:</strong> ${data.reproducibility_score}/10</p>
                    <hr/>
                    <h4>🧠 Summary</h4>
                    <p>${data.summary}</p>
                    <hr/>
                    <h4>🔬 High-Level Insights</h4>
                    <ul>
                `;

                if (data.insights && data.insights.length > 0) {
                    data.insights.forEach(insight => {
                        dashboardHTML += `<li><strong>${insight.type} (${insight.confidence * 100}% Confidence):</strong> ${insight.content}</li>`;
                    });
                } else {
                    dashboardHTML += `<li>No major insights found.</li>`;
                }
                dashboardHTML += `</ul>`;

                appendMessage('ai', dashboardHTML, "Dashboard Orchestrator");
            } else {
                appendMessage('system', `Error: ${data.detail || 'Analysis failed'}`);
            }
        } catch (err) {
            chatHistoryEl.removeChild(loadingMsg);
            appendMessage('system', `Analysis failed: ${err.message}`);
        } finally {
            chatInputEl.disabled = false;
            analyzeBtnEl.disabled = false;
            if(chatInputEl.value.trim().length > 0) sendBtnEl.disabled = false;
        }
    }

    function showUploadNotification(message) {
        if (!uploadNotifEl) return;
        uploadNotifEl.innerHTML = `<button class="close-notif" onclick="hideUploadNotification()" aria-label="Dismiss">&times;</button>` + message;
        uploadNotifEl.style.display = 'block';
    }

    function hideUploadNotification() {
        if (!uploadNotifEl) return;
        uploadNotifEl.style.display = 'none';
    }

    fileInputEl.addEventListener('change', hideUploadNotification); // reset when selecting a new file
</script>
</body>
</html>
